services:
  - type: web
    name: casa-mahana-pms
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3201
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
